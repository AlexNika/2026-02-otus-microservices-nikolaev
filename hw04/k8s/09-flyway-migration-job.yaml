apiVersion: batch/v1
kind: Job
metadata:
  name: hw04-flyway-migrate
  labels:
    app.kubernetes.io/name: hw04
    app.kubernetes.io/instance: hw04
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hw04
        app.kubernetes.io/instance: hw04
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z hw04-postgresql 5432; do
                echo "PostgreSQL is not ready yet. Waiting..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: flyway
          image: "flyway/flyway:10.16.0"
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: hw04-app-config
            - configMapRef:
                name: hw04-postgres-config
            - secretRef:
                name: hw04-postgres-secret
          command:
            - /bin/sh
            - -c
            - |
              echo "Running flyway migrate..."
              flyway -url=${SPRING_DATASOURCE_URL} \
                     -user=${SPRING_DATASOURCE_USERNAME} \
                     -password=${SPRING_DATASOURCE_PASSWORD} \
                     -locations=${SPRING_FLYWAY_LOCATIONS} \
                     migrate
  backoffLimit: 4
