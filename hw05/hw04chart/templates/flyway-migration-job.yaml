{{- if .Values.flywayJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hw04chart.fullname" . }}-flyway-migrate
  labels:
    {{ include "hw04chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      labels:
        {{ include "hw04chart.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z {{ include "hw04chart.fullname" . }}-postgresql 5432; do
                echo "PostgreSQL is not ready yet. Waiting..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: flyway
          image: "{{ .Values.flywayJob.image.repository }}:{{ .Values.flywayJob.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "hw04chart.fullname" . }}-app-config
            - configMapRef:
                name: {{ include "hw04chart.fullname" . }}-postgres-config
            - secretRef:
                name: {{ include "hw04chart.fullname" . }}-postgres-secret
          command:
            - /bin/sh
            - -c
            - |
              echo "Running flyway migrate..."
              flyway -url=${SPRING_DATASOURCE_URL} \
                     -user=${SPRING_DATASOURCE_USERNAME} \
                     -password=${SPRING_DATASOURCE_PASSWORD} \
                     -locations=${SPRING_FLYWAY_LOCATIONS} \
                     migrate
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{ toYaml . | nindent 8 }}
      {{- end }}
  backoffLimit: 4
{{- end }}