{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hw04chart.fullname" . }}-postgresql
  labels:
    {{ include "hw04chart.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "hw04chart.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hw04chart.fullname" . }}-postgres-secret
                  key: password
          resources:
            {{ toYaml .Values.postgresql.primary.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres
            - name: postgres-initdb
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          {{- with .Values.postgresql.primary.containerSecurityContext }}
          securityContext:
            {{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: postgres-initdb
          configMap:
            name: {{ include "hw04chart.fullname" . }}-postgres-config
            items:
              - key: init.sql
                path: init.sql
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{ toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.primary.persistence.size | default "1Gi" }}
{{- end }}