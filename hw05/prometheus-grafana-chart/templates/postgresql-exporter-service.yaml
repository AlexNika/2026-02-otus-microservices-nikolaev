{{- if .Values.postgresqlExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "prometheus-grafana-chart.fullname" . }}-postgresql-exporter
  labels:
    {{ include "prometheus-grafana-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9187
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{ include "prometheus-grafana-chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql-exporter
{{- end }}
