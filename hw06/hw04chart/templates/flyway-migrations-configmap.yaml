{{- if .Values.flywayJob.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hw04chart.fullname" . }}-flyway-migrations
  labels:
    {{ include "hw04chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-6"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
data:
  V1__create_users_table.sql: |
    CREATE TABLE users
    (
        id               BIGINT GENERATED BY DEFAULT AS IDENTITY NOT NULL,
        version          BIGINT       NOT NULL,
        created          TIMESTAMP    NOT NULL,
        updated          TIMESTAMP    NOT NULL,
        created_by       VARCHAR(255),
        last_modified_by VARCHAR(255),
        email            VARCHAR(255) NOT NULL UNIQUE,
        password         VARCHAR(255) NOT NULL,
        enabled          BOOLEAN      NOT NULL DEFAULT TRUE,
        locked           BOOLEAN      NOT NULL DEFAULT FALSE,
        account_expired  BOOLEAN      NOT NULL DEFAULT FALSE,
        credentials_expired BOOLEAN    NOT NULL DEFAULT FALSE,
        CONSTRAINT pk_users PRIMARY KEY (id)
    );

    ALTER TABLE users
        ADD CONSTRAINT UC_USERS_EMAIL UNIQUE (email);

    CREATE INDEX idx_users_email_enabled ON users (email, enabled);

  V2__create_user_profile_table.sql: |
    CREATE TABLE user_profile
    (
        id               BIGINT       NOT NULL GENERATED BY DEFAULT AS IDENTITY,
        version          BIGINT       NOT NULL,
        created          TIMESTAMP    NOT NULL,
        updated          TIMESTAMP    NOT NULL,
        created_by       VARCHAR(255),
        last_modified_by VARCHAR(255),
        username         VARCHAR(255) NOT NULL,
        firstname        VARCHAR(255),
        lastname         VARCHAR(255),
        birthdate        TIMESTAMP,
        CONSTRAINT pk_user_profile PRIMARY KEY (id)
    );

    ALTER TABLE users
        ADD COLUMN profile_id BIGINT;

    ALTER TABLE users
        ADD CONSTRAINT fk_user_profile
            FOREIGN KEY (profile_id)
                REFERENCES user_profile (id)
                ON DELETE SET NULL;

    DO $$
        DECLARE
            max_user_id BIGINT;
        BEGIN
            SELECT COALESCE(MAX(id), 0) INTO max_user_id FROM users;
            PERFORM setval(pg_get_serial_sequence('user_profile', 'id'), max_user_id + 10);
        END $$;

  V3__create_roles_table.sql: |
    CREATE TABLE roles
    (
        id               BIGINT GENERATED BY DEFAULT AS IDENTITY NOT NULL,
        version          BIGINT       NOT NULL,
        created          TIMESTAMP    NOT NULL,
        updated          TIMESTAMP    NOT NULL,
        created_by       VARCHAR(255),
        last_modified_by VARCHAR(255),
        name             VARCHAR(50)  NOT NULL UNIQUE,
        description      VARCHAR(255),
        CONSTRAINT pk_roles PRIMARY KEY (id)
    );

    CREATE INDEX idx_roles_name ON roles (name);

  V4__create_user_roles_table.sql: |
    CREATE TABLE user_roles
    (
        user_id BIGINT NOT NULL,
        role_id BIGINT NOT NULL,
        CONSTRAINT pk_user_roles PRIMARY KEY (user_id, role_id),
        CONSTRAINT fk_user_roles_user FOREIGN KEY (user_id) REFERENCES users (id) ON DELETE CASCADE,
        CONSTRAINT fk_user_roles_role FOREIGN KEY (role_id) REFERENCES roles (id) ON DELETE CASCADE
    );

    CREATE INDEX idx_user_roles_user_id ON user_roles (user_id);
    CREATE INDEX idx_user_roles_role_id ON user_roles (role_id);

  R__001_insert_default_roles.sql: |
    INSERT INTO roles (version, created, updated, created_by, last_modified_by, name, description)
    VALUES (1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP, 'system', 'system', 'USER', 'Default user role');

    INSERT INTO roles (version, created, updated, created_by, last_modified_by, name, description)
    VALUES (1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP, 'system', 'system', 'ADMIN', 'Administrator role with full access');

  R__002_insert_user_with_admin_role.sql: |
    INSERT INTO users (version, created, updated, created_by, last_modified_by, email, password, enabled, locked, account_expired, credentials_expired)
    VALUES (1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP, 'system', 'system', 'admin@admin.com', '$2a$12$cYqKqRIZR2h2MlRh7s7PfunQ8rPCPlULeJDD7AEr9giygKPVnXkDW', true, false, false, false)
    ON CONFLICT (email) DO NOTHING;

    INSERT INTO user_roles (user_id, role_id)
    SELECT u.id, r.id FROM users u, roles r
    WHERE u.email = 'admin@admin.com' AND r.name = 'ADMIN'
    AND NOT EXISTS (
        SELECT 1 FROM user_roles ur 
        WHERE ur.user_id = u.id AND ur.role_id = r.id
    );

  R__003_insert_user_admin_profile.sql: |
    INSERT INTO user_profile (id, version, created, updated, created_by, last_modified_by, username, firstname, lastname)
    VALUES (1, 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP, 'system', 'system', 'admin', 'Administrator', 'System')
    ON CONFLICT (id) DO NOTHING;

    UPDATE users
    SET profile_id = 1
    WHERE email = 'admin@admin.com' AND profile_id IS NULL;
{{- end }}
