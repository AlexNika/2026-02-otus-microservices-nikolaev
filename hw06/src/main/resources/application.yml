# yaml-language-server: $schema=https://json.schemastore.org/spring-configuration-metadata.json
spring:
  profiles:
    active: dev
  application:
    name: hw06
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hw06db}
    username: ${SPRING_DATASOURCE_USERNAME:hw06user}
    password: ${SPRING_DATASOURCE_PASSWORD:hw06pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8000}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    ru.otus.hw: DEBUG
    ru.otus.hw.config.SecurityConfig: TRACE

app:
  simulation-errors-bypass-enabled: true
  security:
    jwt-secret-key: ${JWT_SECRET_KEY:mySecretKeyForJwtTokenGenerationThatIsLongEnough2024HW06}
    jwt-expiration-time: ${JWT_EXPIRATION_TIME:86400000}
    bcrypt-iterations: ${BCRYPT_STRENGTH:12}